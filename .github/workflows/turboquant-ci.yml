name: TurboQuant CI

on:
  pull_request:
    paths:
      - 'tensorflow/python/ops/turboquant/**'
      - '.github/workflows/turboquant-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'tensorflow/python/ops/turboquant/**'
      - '.github/workflows/turboquant-ci.yml'

concurrency:
  group: turboquant-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  turboquant-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Python syntax checks
        run: |
          python -m py_compile \
            tensorflow/python/ops/turboquant/__init__.py \
            tensorflow/python/ops/turboquant/api.py \
            tensorflow/python/ops/turboquant/benchmark_turboquant.py \
            tensorflow/python/ops/turboquant/benchmark_real_models.py \
            tensorflow/python/ops/turboquant/analyze_turboquant_results.py \
            tensorflow/python/ops/turboquant/run_turboquant_ablations.py \
            tensorflow/python/ops/turboquant/calibration.py \
            tensorflow/python/ops/turboquant/config.py \
            tensorflow/python/ops/turboquant/core.py \
            tensorflow/python/ops/turboquant/keras.py \
            tensorflow/python/ops/turboquant/profile_turboquant.py

      - name: TurboQuant benchmark regression tests
        run: |
          bazel test //tensorflow/python/ops/turboquant:benchmark_test \
            --repo_env=HERMETIC_PYTHON_VERSION=3.12 \
            --test_output=errors

      - name: TurboQuant task-level quality smoke
        run: |
          bazel run //tensorflow/python/ops/turboquant:benchmark_real_models -- \
            --models=residual_cnn \
            --seeds=123,456 \
            --dataset_source=synthetic \
            --sample_count=64 \
            --eval_count=32 \
            --batch_size=8 \
            --warmup_steps=0 \
            --benchmark_steps=1 \
            --num_classes=5 \
            --max_turboquant_accuracy_drop=0.10 \
            --max_baseline_accuracy_drop=0.15 \
            --min_turboquant_argmax_agreement=0.75 \
            --min_baseline_argmax_agreement=0.70 \
            --max_turboquant_mse=2.0

  turboquant-windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: TurboQuant core smoke test
        shell: pwsh
        run: |
          bazel test //tensorflow/python/ops/turboquant:core_test --repo_env=HERMETIC_PYTHON_VERSION=3.12 --test_output=errors
