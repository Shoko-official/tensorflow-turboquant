name: TurboQuant CI

on:
  pull_request:
    paths:
      - 'tensorflow/python/ops/turboquant/**'
      - '.github/workflows/turboquant-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'tensorflow/python/ops/turboquant/**'
      - '.github/workflows/turboquant-ci.yml'

concurrency:
  group: turboquant-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  turboquant-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python syntax checks
        run: |
          python -m py_compile \
            tensorflow/python/ops/turboquant/__init__.py \
            tensorflow/python/ops/turboquant/api.py \
            tensorflow/python/ops/turboquant/benchmark_turboquant.py \
            tensorflow/python/ops/turboquant/benchmark_real_models.py \
            tensorflow/python/ops/turboquant/analyze_turboquant_results.py \
            tensorflow/python/ops/turboquant/run_turboquant_ablations.py \
            tensorflow/python/ops/turboquant/calibration.py \
            tensorflow/python/ops/turboquant/config.py \
            tensorflow/python/ops/turboquant/core.py \
            tensorflow/python/ops/turboquant/keras.py \
            tensorflow/python/ops/turboquant/profile_turboquant.py

      - name: Core smoke checks
        run: |
          python - <<'PY'
          import numpy as np
          from tensorflow.python.ops.turboquant.config import TurboQuantConfig
          from tensorflow.python.ops.turboquant.core import (
              unpack_indices,
              pack_indices,
              quantize_tensor,
              summarize_encoding,
          )
          rng = np.random.default_rng(123)
          tensor = rng.normal(size=(32, 16)).astype(np.float32)
          encoding = quantize_tensor(tensor, TurboQuantConfig(num_bits=4, group_size=8))
          summary = summarize_encoding(tensor, encoding)
          ratio = float(summary['compression_ratio'])
          mse = float(summary['mean_squared_error'])
          if ratio < 1.0:
              raise SystemExit(f'Compression ratio regression: {ratio}')
          if mse > 0.2:
              raise SystemExit(f'Output MSE regression: {mse}')
          indices = np.arange(128, dtype=np.uint8) % 16
          packed = pack_indices(indices, num_bits=4)
          restored = unpack_indices(packed, shape=(128,), num_bits=4)
          if not np.array_equal(indices, restored):
              raise SystemExit('Packed index round-trip regression detected.')
          print(f'Regression guard passed: ratio={ratio:.4f}, mse={mse:.6f}')
          PY

  turboquant-windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: TurboQuant core smoke test
        shell: pwsh
        run: |
          bazel test //tensorflow/python/ops/turboquant:core_test --repo_env=HERMETIC_PYTHON_VERSION=3.12 --test_output=errors
